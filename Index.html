<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Beauty Tracker ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cream: #fdf6f0;
    --peach: #fce8d8;
    --terracotta: #c45e2e;
    --terracotta-light: #e8896a;
    --brown: #2d1a0e;
    --mid: #9b6b4a;
    --soft: #edd9c8;
    --card: rgba(255,255,255,0.78);
    --urgent: #fee2e2;
    --urgent-text: #b91c1c;
    --soon: #fef3c7;
    --soon-text: #b45309;
    --ok: #d1fae5;
    --ok-text: #065f46;
    --purple: #6d28d9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #fdf6f0 0%, #fce8d8 55%, #f5d4c2 100%);
    min-height: 100vh;
    color: var(--brown);
  }
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse 60% 40% at 80% 20%, rgba(196,94,46,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 10% 80%, rgba(109,40,217,0.04) 0%, transparent 70%);
  }
  .wrap { max-width: 740px; margin: 0 auto; padding: 28px 16px 60px; position: relative; z-index: 1; }

/* HEADER */
.header { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 14px; margin-bottom: 24px; }
.header-left .eyebrow { font-size: 10px; letter-spacing: 3px; color: #c49070; text-transform: uppercase; margin-bottom: 5px; }
.header-left h1 { font-family: ‘Cormorant Garamond’, serif; font-size: clamp(26px, 6vw, 38px); font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
.header-left .sub { font-size: 13px; color: var(–mid); margin-top: 5px; font-style: italic; font-family: ‘Cormorant Garamond’, serif; }
.btn-add {
background: var(–terracotta); color: #fff; border: none; border-radius: 13px;
padding: 12px 24px; font-family: ‘DM Sans’, sans-serif; font-size: 14px; font-weight: 600;
cursor: pointer; letter-spacing: 0.2px;
box-shadow: 0 4px 18px rgba(196,94,46,0.35);
transition: transform 0.15s, box-shadow 0.15s;
}
.btn-add:hover { transform: translateY(-2px); box-shadow: 0 7px 24px rgba(196,94,46,0.45); }

/* STATS */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card {
background: var(–card); border-radius: 14px; padding: 15px 16px;
border: 1px solid rgba(196,94,46,0.13); backdrop-filter: blur(10px);
animation: fadeUp 0.4s ease both;
}
.stat-icon { font-size: 18px; margin-bottom: 4px; }
.stat-value { font-family: ‘Cormorant Garamond’, serif; font-size: 30px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 10px; color: var(–mid); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 3px; }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
padding: 6px 14px; border-radius: 99px; font-size: 12px; font-family: ‘DM Sans’, sans-serif;
font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1.5px solid var(–soft);
background: rgba(255,255,255,0.7); color: var(–mid);
}
.filter-btn.active { background: var(–terracotta); color: #fff; border-color: var(–terracotta); }
select.sort-select {
padding: 7px 13px; border-radius: 10px; border: 1.5px solid var(–soft);
background: rgba(255,255,255,0.7); font-family: ‘DM Sans’, sans-serif;
font-size: 12px; color: var(–mid); cursor: pointer; outline: none;
}

/* CARDS */
.product-list { display: flex; flex-direction: column; gap: 12px; }
.product-card {
background: var(–card); border-radius: 18px; padding: 18px 20px;
border: 1.5px solid rgba(196,94,46,0.12); backdrop-filter: blur(10px);
cursor: pointer; transition: all 0.25s;
animation: fadeUp 0.4s ease both;
}
.product-card:hover { box-shadow: 0 6px 24px rgba(196,94,46,0.12); transform: translateY(-1px); }
.product-card.urgent { border-color: #fca5a5; background: rgba(255,245,244,0.9); }
.product-card.expanded { box-shadow: 0 10px 36px rgba(196,94,46,0.16); }
.card-top { display: flex; align-items: flex-start; gap: 13px; }
.card-icon {
width: 42px; height: 42px; border-radius: 13px; flex-shrink: 0;
display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.card-body { flex: 1; min-width: 0; }
.card-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-name { font-weight: 600; font-size: 15px; }
.badge {
border-radius: 99px; padding: 2px 10px; font-size: 11px; font-weight: 700;
letter-spacing: 0.4px; white-space: nowrap;
}
.badge-urgent { background: var(–urgent); color: var(–urgent-text); }
.badge-soon { background: var(–soon); color: var(–soon-text); }
.badge-ok { background: var(–ok); color: var(–ok-text); }
.badge-open { background: #ede9fe; color: var(–purple); }
.badge-finished { background: #f1f5f9; color: #64748b; }
.card-meta { font-size: 12px; color: #c49070; margin-top: 3px; }
.price-tag { font-size: 12px; color: var(–mid); font-weight: 500; }

/* PROGRESS */
.progress-row { margin-top: 11px; }
.progress-labels { display: flex; justify-content: space-between; margin-bottom: 5px; }
.progress-labels span { font-size: 11px; color: var(–mid); }
.progress-labels .days-left { font-weight: 600; }
.days-left.red { color: var(–urgent-text); }
.days-left.orange { color: var(–soon-text); }
.progress-track { background: #f0ebe6; border-radius: 99px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(.4,0,.2,1); }

/* PREDICTION */
.prediction-row { margin-top: 9px; display: flex; gap: 14px; flex-wrap: wrap; }
.prediction-row span { font-size: 12px; color: var(–mid); }
.prediction-row strong { color: var(–brown); }

/* DETAIL */
.card-detail { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(–soft); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 13px; }
.detail-cell { background: #fdf6f0; border-radius: 9px; padding: 9px 13px; }
.detail-cell-label { font-size: 10px; color: #c49070; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.detail-cell-value { font-size: 14px; font-weight: 600; }
.advice-box { border-radius: 10px; padding: 11px 14px; margin-bottom: 13px; border: 1px solid; }
.advice-box.now { background: #fee2e2; border-color: #fca5a5; }
.advice-box.wait { background: #d1fae5; border-color: #6ee7b7; }
.advice-title { font-size: 12px; font-weight: 700; margin-bottom: 3px; }
.advice-text { font-size: 13px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { padding: 8px 16px; border-radius: 9px; font-size: 13px; font-family: ‘DM Sans’, sans-serif; cursor: pointer; transition: all 0.15s; }
.btn-edit { background: transparent; border: 1.5px solid var(–soft); color: var(–mid); }
.btn-edit:hover { border-color: var(–terracotta); color: var(–terracotta); }
.btn-done { background: var(–purple); border: none; color: #fff; }
.btn-done:hover { background: #5b21b6; }
.btn-del { background: transparent; border: 1.5px solid #fca5a5; color: var(–urgent-text); }
.btn-del:hover { background: #fee2e2; }

/* EMPTY */
.empty { text-align: center; color: #c49070; padding: 50px 20px; font-style: italic; font-family: ‘Cormorant Garamond’, serif; font-size: 18px; }

/* MODAL */
.overlay {
position: fixed; inset: 0; background: rgba(20,10,5,0.45); z-index: 100;
display: flex; align-items: center; justify-content: center;
backdrop-filter: blur(5px); padding: 16px;
opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.overlay.visible { opacity: 1; pointer-events: all; }
.modal {
background: #fffaf7; border-radius: 22px; padding: 32px 28px;
max-width: 480px; width: 100%;
box-shadow: 0 24px 64px rgba(0,0,0,0.2); border: 1px solid var(–soft);
transform: translateY(16px); transition: transform 0.25s;
}
.overlay.visible .modal { transform: translateY(0); }
.modal h2 { font-family: ‘Cormorant Garamond’, serif; font-size: 24px; font-weight: 700; margin-bottom: 22px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(–mid); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.field input, .field select, .field textarea {
width: 100%; padding: 10px 14px; border-radius: 11px; border: 1.5px solid var(–soft);
background: #fffdf9; font-family: ‘DM Sans’, sans-serif; font-size: 14px;
color: var(–brown); outline: none; transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(–terracotta); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
.btn-cancel { background: transparent; border: 1.5px solid var(–soft); color: var(–mid); padding: 10px 20px; border-radius: 11px; font-size: 14px; font-family: ‘DM Sans’, sans-serif; cursor: pointer; }
.btn-save { background: var(–terracotta); color: #fff; border: none; padding: 10px 22px; border-radius: 11px; font-size: 14px; font-weight: 600; font-family: ‘DM Sans’, sans-serif; cursor: pointer; }
.btn-save:hover { background: #a84d22; }

/* TOAST */
.toast {
position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
background: var(–brown); color: #fff; padding: 11px 22px; border-radius: 99px;
font-size: 13px; font-family: ‘DM Sans’, sans-serif; z-index: 200;
transition: transform 0.3s cubic-bezier(.4,0,.2,1); white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}
</style>

</head>
<body>
<div class="wrap">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="eyebrow">Mon espace beauté</div>
      <h1>Beauty Tracker ✦</h1>
      <div class="sub">Suivi intelligent & prévisions shopping</div>
    </div>
    <button class="btn-add" onclick="openModal()">+ Ajouter</button>
  </div>

  <!-- STATS -->

  <div class="stats" id="stats"></div>

  <!-- TOOLBAR -->

  <div class="toolbar">
    <div class="filters" id="filters"></div>
    <select class="sort-select" id="sortSelect" onchange="render()">
      <option value="urgency">Trier : Urgence</option>
      <option value="name">Trier : Nom A→Z</option>
      <option value="price">Trier : Prix ↓</option>
    </select>
  </div>

  <!-- LIST -->

  <div class="product-list" id="list"></div>
</div>

<!-- MODAL -->

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modalTitle">Nouveau produit</h2>
    <input type="hidden" id="editId"/>
    <div class="field">
      <label>Nom du produit *</label>
      <input type="text" id="fName" placeholder="ex: Crème Clinique Moisture Surge…"/>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Catégorie</label>
        <select id="fCategory">
          <option>Visage</option><option>Corps</option><option>Cheveux</option>
          <option>Maquillage</option><option>Parfum</option><option>Solaire</option>
        </select>
      </div>
      <div class="field">
        <label>Prix (€)</label>
        <input type="number" id="fPrice" placeholder="0" min="0" step="0.01"/>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Date d'ouverture</label>
        <input type="date" id="fOpened"/>
      </div>
      <div class="field">
        <label>Date terminé (si applicable)</label>
        <input type="date" id="fEmpty"/>
      </div>
    </div>
    <div class="field">
      <label>Notes (format, contenance, lien…)</label>
      <input type="text" id="fNotes" placeholder="ex: 50ml, format voyage, Nocibé…"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveProduct()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- TOAST -->

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = ["Tous","Visage","Corps","Cheveux","Maquillage","Parfum","Solaire"];
const CAT_ICONS = { Visage:"🧴", Corps:"🫧", Cheveux:"💆", Maquillage:"💄", Parfum:"✨", Solaire:"☀️" };
const CAT_COLORS = {
  urgent: "#fee2e2", soon: "#fef3c7", open: "#ede9fe", ok: "#d1fae5", finished: "#f1f5f9"
};
const SALE_SEASONS = [
  { name: "Soldes Hiver", months: [1,2], label: "Jan–Fév" },
  { name: "Soldes Été", months: [7,8], label: "Juil–Août" },
  { name: "Black Friday", months: [11], label: "Novembre" },
  { name: "Fêtes de fin d'année", months: [12], label: "Décembre" },
];

let products = [];
let activeFilter = "Tous";
let expandedId = null;

function load() {
  try { products = JSON.parse(localStorage.getItem("beautytracker_v2") || "[]"); }
  catch(e) { products = []; }
  if (!products.length) {
    products = [
      { id: 1, name: "Crème hydratante Clinique", category: "Visage", openedDate: "2025-01-10", emptyDate: "2025-03-15", price: 42, notes: "50ml" },
      { id: 2, name: "Shampoing Kérastase", category: "Cheveux", openedDate: "2025-02-01", emptyDate: null, price: 28, notes: "250ml" },
      { id: 3, name: "Sérum Vitamine C", category: "Visage", openedDate: "2024-11-20", emptyDate: "2025-02-10", price: 55, notes: "30ml" },
    ];
    save();
  }
}
function save() { localStorage.setItem("beautytracker_v2", JSON.stringify(products)); }

function today() { return new Date().toISOString().split("T")[0]; }
function daysBetween(d1, d2) { return Math.round((new Date(d2)-new Date(d1))/(86400000)); }
function addDays(d, n) { const x=new Date(d); x.setDate(x.getDate()+n); return x.toISOString().split("T")[0]; }
function fmtDate(d) {
  if (!d) return "—";
  return new Date(d+"T12:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});
}

function getNextSale(targetDate) {
  const d = new Date(targetDate);
  const year = d.getFullYear();
  let best = null, minDiff = Infinity;
  for (let y = year; y <= year+1; y++) {
    for (const s of SALE_SEASONS) {
      for (const m of s.months) {
        const sd = new Date(y, m-1, 1);
        const diff = Math.round((sd - d) / 86400000);
        if (diff >= -30 && diff < minDiff) { minDiff = diff; best = {...s, daysAway: diff, date: sd}; }
      }
    }
  }
  return best;
}

function enrich(p) {
  const t = today();
  const dur = (p.openedDate && p.emptyDate) ? daysBetween(p.openedDate, p.emptyDate) : null;
  const daysSince = p.openedDate ? daysBetween(p.openedDate, t) : 0;
  const pct = dur ? Math.min(100, Math.round(daysSince/dur*100)) : null;
  const predictedEmpty = (dur && p.openedDate && !p.emptyDate) ? addDays(p.openedDate, dur) : null;
  const daysLeft = predictedEmpty ? daysBetween(t, predictedEmpty) : null;
  const peers = products.filter(x=>x.id!==p.id && x.category===p.category && x.openedDate && x.emptyDate);
  const avgCat = peers.length ? Math.round(peers.reduce((s,x)=>s+daysBetween(x.openedDate,x.emptyDate),0)/peers.length) : null;
  let status = "ok";
  if (p.emptyDate) status = "finished";
  else if (daysLeft!==null) { if(daysLeft<14) status="urgent"; else if(daysLeft<30) status="soon"; else status="open"; }
  else status = "open";
  const saleSeason = predictedEmpty ? getNextSale(addDays(predictedEmpty,-14)) : null;
  return {...p, dur, daysSince, pct, predictedEmpty, daysLeft, status, saleSeason, avgCat};
}

function getFiltered() {
  let list = products.map(enrich);
  if (activeFilter !== "Tous") list = list.filter(p=>p.category===activeFilter);
  const sort = document.getElementById("sortSelect")?.value || "urgency";
  if (sort==="urgency") {
    const ord={urgent:0,soon:1,open:2,ok:3,finished:4};
    list.sort((a,b)=>(ord[a.status]??5)-(ord[b.status]??5));
  } else if (sort==="name") {
    list.sort((a,b)=>a.name.localeCompare(b.name));
  } else if (sort==="price") {
    list.sort((a,b)=>(b.price||0)-(a.price||0));
  }
  return list;
}

function renderStats() {
  const all = products.map(enrich);
  const active = all.filter(p=>!p.emptyDate).length;
  const urgent = all.filter(p=>p.status==="urgent").length;
  const soon = all.filter(p=>p.status==="soon").length;
  const finished = all.filter(p=>p.emptyDate).length;
  const data = [
    {icon:"✦", value:active, label:"Produits actifs", color:"var(--purple)"},
    {icon:"⚠", value:urgent, label:"Urgents", color:"var(--urgent-text)"},
    {icon:"◎", value:soon, label:"Bientôt vides", color:"var(--soon-text)"},
    {icon:"✓", value:finished, label:"Terminés", color:"var(--ok-text)"},
  ];
  document.getElementById("stats").innerHTML = data.map((s,i)=>`
    <div class="stat-card" style="animation-delay:${i*0.06}s">
      <div class="stat-icon">${s.icon}</div>
      <div class="stat-value" style="color:${s.color}">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join("");
}

function renderFilters() {
  document.getElementById("filters").innerHTML = CATEGORIES.map(c=>`
    <button class="filter-btn${c===activeFilter?" active":""}" onclick="setFilter('${c}')">${c}</button>
  `).join("");
}

function badgeHtml(status) {
  const map = {urgent:"Urgent",soon:"Bientôt",ok:"OK",open:"En cours",finished:"Terminé"};
  return `<span class="badge badge-${status}">${map[status]||status}</span>`;
}

function progressColor(pct) {
  if (pct>85) return "#ef4444";
  if (pct>65) return "#f59e0b";
  return "#8b5cf6";
}

function renderList() {
  const list = getFiltered();
  const el = document.getElementById("list");
  if (!list.length) { el.innerHTML = `<div class="empty">Aucun produit — clique sur + Ajouter ✦</div>`; return; }
  el.innerHTML = list.map((p,i)=>{
    const isExp = expandedId===p.id;
    const iconBg = CAT_COLORS[p.status]||"#f1f5f9";
    const icon = CAT_ICONS[p.category]||"✦";
    let progress = "";
    if (!p.emptyDate && p.pct!==null) {
      const dlClass = p.daysLeft<14?"red":p.daysLeft<30?"orange":"";
      const dlText = p.daysLeft>0?`~${p.daysLeft}j restants`:"⚠ vide !";
      progress = `<div class="progress-row">
        <div class="progress-labels">
          <span>Consommé : ${p.pct}%</span>
          ${p.daysLeft!==null?`<span class="days-left ${dlClass}">${dlText}</span>`:""}
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${p.pct}%;background:${progressColor(p.pct)}"></div></div>
      </div>`;
    }
    let pred = "";
    if (!p.emptyDate && p.predictedEmpty) {
      let saleHtml = "";
      if (p.saleSeason) {
        const saleColor = p.saleSeason.daysAway<=0?"var(--urgent-text)":"var(--ok-text)";
        const saleTxt = p.saleSeason.daysAway<=0
          ? `🛍 ${p.saleSeason.name} — <strong>maintenant !</strong>`
          : `🛍 ${p.saleSeason.name} dans ${p.saleSeason.daysAway}j`;
        saleHtml = `<span style="color:${saleColor}">${saleTxt}</span>`;
      }
      pred = `<div class="prediction-row">
        <span>🗓 Fin estimée : <strong>${fmtDate(p.predictedEmpty)}</strong></span>
        ${saleHtml}
      </div>`;
    }
    let detail = "";
    if (isExp) {
      let advice = "";
      if (!p.emptyDate && p.saleSeason) {
        const cls = p.saleSeason.daysAway<=0?"now":"wait";
        const atitle = p.saleSeason.daysAway<=0?"💡 C'est le moment d'acheter !":"💡 Conseil shopping";
        const atxt = p.saleSeason.daysAway<=0
          ? `Les ${p.saleSeason.name} sont en cours — commande maintenant au meilleur prix !`
          : `Les ${p.saleSeason.name} (${p.saleSeason.label}) arrivent dans ${p.saleSeason.daysAway} jours. Tu peux attendre pour acheter "${p.name}" à prix réduit.`;
        advice = `<div class="advice-box ${cls}"><div class="advice-title" style="color:${cls==='now'?'var(--urgent-text)':'var(--ok-text)'}">${atitle}</div><div class="advice-text">${atxt}</div></div>`;
      }
      detail = `<div class="card-detail">
        <div class="detail-grid">
          <div class="detail-cell"><div class="detail-cell-label">Ouvert le</div><div class="detail-cell-value">${fmtDate(p.openedDate)}</div></div>
          <div class="detail-cell"><div class="detail-cell-label">Terminé le</div><div class="detail-cell-value">${fmtDate(p.emptyDate)}</div></div>
          <div class="detail-cell"><div class="detail-cell-label">Durée réelle</div><div class="detail-cell-value">${p.dur?p.dur+" jours":"—"}</div></div>
          <div class="detail-cell"><div class="detail-cell-label">Moy. catégorie</div><div class="detail-cell-value">${p.avgCat?p.avgCat+" jours":"—"}</div></div>
        </div>
        ${advice}
        <div class="card-actions">
          <button class="btn btn-edit" onclick="event.stopPropagation();openEdit(${p.id})">✏️ Modifier</button>
          ${!p.emptyDate?`<button class="btn btn-done" onclick="event.stopPropagation();markEmpty(${p.id})">✓ Terminé</button>`:""}
          <button class="btn btn-del" onclick="event.stopPropagation();deleteProduct(${p.id})">🗑 Supprimer</button>
        </div>
      </div>`;
    }
    return `<div class="product-card ${p.status==="urgent"?"urgent":""} ${isExp?"expanded":""}"
      style="animation-delay:${i*0.05}s"
      onclick="toggleExpand(${p.id})">
      <div class="card-top">
        <div class="card-icon" style="background:${iconBg}">${icon}</div>
        <div class="card-body">
          <div class="card-title-row">
            <span class="card-name">${p.name}</span>
            ${badgeHtml(p.status)}
            ${p.price?`<span class="price-tag">${p.price}€</span>`:""}
          </div>
          <div class="card-meta">${p.category}${p.notes?" · "+p.notes:""}</div>
          ${progress}
          ${pred}
        </div>
      </div>
      ${detail}
    </div>`;
  }).join("");
}

function render() { renderStats(); renderFilters(); renderList(); }
function setFilter(f) { activeFilter=f; render(); }
function toggleExpand(id) { expandedId = expandedId===id?null:id; renderList(); }

function openModal(id) {
  document.getElementById("editId").value = id||"";
  document.getElementById("modalTitle").textContent = id?"Modifier le produit":"Nouveau produit";
  if (id) {
    const p = products.find(x=>x.id===id);
    if (p) {
      document.getElementById("fName").value = p.name||"";
      document.getElementById("fCategory").value = p.category||"Visage";
      document.getElementById("fPrice").value = p.price||"";
      document.getElementById("fOpened").value = p.openedDate||"";
      document.getElementById("fEmpty").value = p.emptyDate||"";
      document.getElementById("fNotes").value = p.notes||"";
    }
  } else {
    document.getElementById("fName").value="";
    document.getElementById("fCategory").value="Visage";
    document.getElementById("fPrice").value="";
    document.getElementById("fOpened").value=today();
    document.getElementById("fEmpty").value="";
    document.getElementById("fNotes").value="";
  }
  document.getElementById("overlay").classList.add("visible");
}
function openEdit(id) { openModal(id); }
function closeModal() { document.getElementById("overlay").classList.remove("visible"); }
function handleOverlayClick(e) { if(e.target===document.getElementById("overlay")) closeModal(); }

function saveProduct() {
  const name = document.getElementById("fName").value.trim();
  if (!name) { document.getElementById("fName").focus(); return; }
  const id = document.getElementById("editId").value;
  const data = {
    name,
    category: document.getElementById("fCategory").value,
    price: parseFloat(document.getElementById("fPrice").value)||0,
    openedDate: document.getElementById("fOpened").value||null,
    emptyDate: document.getElementById("fEmpty").value||null,
    notes: document.getElementById("fNotes").value.trim(),
  };
  if (id) {
    products = products.map(p=>p.id==id?{...p,...data}:p);
    showToast("Produit modifié ✓");
  } else {
    products.push({...data, id: Date.now()});
    showToast("Produit ajouté ✓");
  }
  save(); closeModal(); render();
}

function markEmpty(id) {
  products = products.map(p=>p.id===id?{...p,emptyDate:today()}:p);
  save(); expandedId=null; render(); showToast("Produit marqué terminé ✓");
}

function deleteProduct(id) {
  if (!confirm("Supprimer ce produit ?")) return;
  products = products.filter(p=>p.id!==id);
  save(); expandedId=null; render(); showToast("Produit supprimé");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2500);
}

load(); render();
</script>

</body>
</html>
